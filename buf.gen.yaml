version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/Darkness4/train-station/go/gen
    - file_option: java_package_prefix
      value: com.example.trainstationapp.data.grpc
    - file_option: optimize_for
      value: LITE_RUNTIME
    - file_option: java_multiple_files
      value: false
  disable:
    - file_option: go_package
      module: buf.build/bufbuild/protovalidate
plugins:
  # Go
  - remote: buf.build/protocolbuffers/go
    out: ./go/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: ./go/gen
    opt:
      - paths=source_relative
  # TypeScript
  - remote: buf.build/bufbuild/es
    out: ./front/gen/ts
    include_imports: true
    opt: target=ts
  # Kotlin
  - remote: buf.build/protocolbuffers/java
    out: ./app/app/src/main/java
    opt: lite
  - remote: buf.build/protocolbuffers/kotlin
    out: ./app/app/src/main/java
    opt: lite
  - remote: buf.build/connectrpc/kotlin
    out: ./app/app/src/main/java
  # Doc
  - local: ./generate-doc.sh
    out: ./docs
    opt: markdown,docs.md,source_relative

inputs:
  - directory: protos/trainstationapis
  - module: buf.build/grpc/grpc:1730f7242d0f45138a638b7612d46586
    paths:
      - grpc/health/v1/health.proto
