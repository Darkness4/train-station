syntax = "proto3";

package com.example.trainstationapp.session;

option java_multiple_files = false;
option java_package = "com.example.trainstationapp.data.datastore";

message OAuth {
  string accessToken = 1;
  string refreshToken = 2;
  string username = 3;
  int64 expiresAt = 4;
}

message CodeVerifier {
  string value = 1;
}